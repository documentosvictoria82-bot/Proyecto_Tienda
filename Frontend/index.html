<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda Virtual</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">

<a class="navbar-brand" href="#">🛒 Mi Tienda Bootcamps</a>

<form class="d-flex me-3" id="formBuscar">
<input 
class="form-control me-2" 
type="search" 
placeholder="Buscar producto"
id="inputBuscar">

<button type="submit" class="btn btn-outline-light">
Buscar
</button>
</form>

<select id="ordenarPrecio" class="form-select w-auto me-3">
<option value="">Ordenar</option>
<option value="menor">Precio menor</option>
<option value="mayor">Precio mayor</option>
</select>

<div class="d-flex align-items-center gap-3">

<button id="toggleTema" class="btn btn-outline-light">
🌙
</button>

<div class="carrito-icono text-white" onclick="toggleCarrito()" style="cursor:pointer;">
🛒
<span id="contadorCarrito" class="badge bg-danger">0</span>
</div>

<a href="./pages/login.html" class="text-white text-decoration-none">Iniciar Sesión</a>
<a href="./pages/registro.html" class="text-white text-decoration-none">Registrarse</a>

<button id="btnCerrarSesion" class="btn btn-sm btn-danger d-none">Cerrar Sesión</button>

</div>
</div>
</nav>

<!-- ================= FILTROS ================= -->

<div class="container mt-4">

<h5>Categorías</h5>

<div class="categorias">
<button type="button" class="categoria" data-cat="todos">Todos</button>
<button type="button" class="categoria" data-cat="portatiles">Portátiles</button>
<button type="button" class="categoria" data-cat="moviles">Dispositivos Móviles</button>
<button type="button" class="categoria" data-cat="accesorios">Accesorios</button>
<button type="button" class="categoria" data-cat="audio">Audio y Video</button>
<button type="button" class="categoria" data-cat="gaming">Gaming</button>
<button type="button" class="categoria" data-cat="electrodomesticos">Electrodomésticos</button>
</div>

<br>

<h6>Filtrar por precio</h6>

<input 
type="range"
min="0"
max="200000000"
step="50"
id="filtroPrecio"
class="form-range">

<p>Precio máximo: $<span id="precioValor">200000000</span></p>

</div>

<!-- ================= PRODUCTOS ================= -->

<div class="container mt-5">

<h2 class="text-center mb-4">Nuestros Productos</h2>

<div id="productos" class="row g-4"></div>

</div>

<!-- ================= PANEL CARRITO ================= -->

<div id="panelCarrito" class="panel-carrito">

<div class="carrito-header d-flex justify-content-between align-items-center">
<h4>🛒 Carrito</h4>
<button type="button" class="btn btn-sm btn-dark" onclick="toggleCarrito()">✖</button>
</div>

<div id="listaCarrito"></div>

<button 
type="button"
class="btn btn-outline-dark w-100 mt-2"
onclick="vaciarCarrito()">
🗑 Vaciar carrito
</button>

<button 
type="button"
class="btn btn-dark w-100 mt-3"
onclick="finalizarCompra()">
Finalizar compra
</button>

</div>

<!-- ================= TOAST ================= -->

<div id="toastCarrito" class="toast-carrito">
Producto agregado al carrito 🛒
</div>

<!-- ================= SCRIPTS ================= -->

<script src="./js/producto.js" defer></script>

</body>
</html>
