<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Vendedor</title>
    <link rel="stylesheet" href="../css/registro.css">
    <script defer src="../js/registro.js"></script>
</head>
<body>

<div class="login-container">
    <h2>Registro de Vendedor</h2>
    <form id="registerForm">
        <input type="text" id="usuario" placeholder="Nombre de usuario" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <select id="role" class="form-select mb-3" required>
             <option value="" disabled selected>Selecciona un rol</option>
             <option value="user">Cliente</option>
             <option value="admin">Vendedor</option>
        </select>
        <button type="submit">Registrarse</button>
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </form>
    <a href="index.html">Volver</a>
</div>

</body>
</html>
