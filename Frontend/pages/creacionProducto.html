<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de Productos</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- TU CSS -->
<link rel="stylesheet" href="../css/FuncionesProveedor.css">

<!-- JS -->
<script src="../js/gestorProveedor.js" defer></script>

</head>


<body class="bg-light">


<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark px-4">

<a class="navbar-brand" href="index.html">
🛒 Mi Tienda
</a>

</nav>



<!-- FORMULARIO -->

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-sm">

<div class="card-body">

<h4 class="text-center mb-4">
Gestión de Productos
</h4>

<form id="formProducto" enctype="multipart/form-data">

<!-- NOMBRE -->

<div class="mb-3">

<label class="form-label">Nombre del Producto</label>

<input 
type="text"
id="name"
name="name"
class="form-control"
placeholder="Ej: Base de portátil"
required>

</div>


<!-- DESCRIPCIÓN -->

<div class="mb-3">

<label class="form-label">Descripción</label>

<textarea 
id="description"
name="description"
class="form-control"
rows="2"
placeholder="Describe el producto">
</textarea>

</div>


<!-- PRECIO Y STOCK -->

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Precio ($)</label>

<input 
type="number"
id="price"
name="price"
class="form-control"
placeholder="0.00"
required>

</div>


<div class="col-md-6 mb-3">

<label class="form-label">Stock</label>

<input 
type="number"
id="stock"
name="stock"
class="form-control"
placeholder="0"
required>

</div>

</div>


<!-- CATEGORIA -->

<div class="mb-3">

<label class="form-label">Categoría</label>

<select id="category" class="form-control">

<option value="hardware">Laptos</option>
<option value="moviles">Dispositivos Moviles</option>
<option value="audio">Accesorios</option>
<option value="audio">Audio y video</option>
<option value="gaming">Gaming</option>
<option value="smart">Smart Home</option>


</select>

</div>


<!-- IMAGEN -->

<div class="mb-3">

<label class="form-label">Imagen del producto</label>

<input 
type="file"
id="imagen"
name="imagen"
class="form-control"
accept="image/*">

</div>


<!-- BOTÓN -->

<div class="d-grid">

<button 
type="submit"
class="btn btn-dark"
id="btnGuardar">

Guardar Producto

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>



<!-- LISTA DE PRODUCTOS -->

<div class="container mt-5">

<h3 class="text-center mb-4">
Productos registrados
</h3>

<div id="listaProductos" class="row g-4">

<!-- productos cargados por JS -->

</div>

</div>


</body>
</html>
