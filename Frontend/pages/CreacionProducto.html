<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../js/creacionProducto.js"></script>
    <link rel="stylesheet" href="../css/creacionproducto.css">
    <title>Vendedor</title>
</head>
<body>
   <div class="container-detalle">
    <div class="info-producto">
        <h1>Nuevo Producto</h1>
        <p class="categoria">Panel del Vendedor</p>
        
        <form class="formulario" enctype="multipart/form-data">
            <div class="input-group">
                <label>Título del producto</label>
                <input type="text" name="titulo" placeholder="Ej: Camiseta de Algodón">
            </div>

            <div class="input-group">
                <label>Descripción</label>
                <textarea name="descripcion" rows="3" placeholder="Describe tu producto..."></textarea>
            </div>

            <div class="fila-doble">
                <div class="input-group">
                    <label>Precio ($)</label>
                    <input type="number" name="precio" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>Categoría</label>
                    <input type="text" name="categoria" placeholder="Moda, Hogar...">
                </div>
            </div>

            <div class="input-group">
                <label>URL de la Imagen</label>
                <input type="file" name="imagen" placeholder="Inserta tu imagen aquí">
            </div>

            <div class="fila-doble">
                <div class="input-group">
                    <label>Calificación (Rate)</label>
                    <input type="number" name="rate" step="0.1" max="5">
                </div>
                <div class="input-group">
                    <label>Stock (Count)</label>
                    <input type="number" name="count">
                </div>
            </div>

            <button type="submit" class="btn-agregar">Crear producto</button>
        </form>
    </div>
</div>
</body>
</html>
