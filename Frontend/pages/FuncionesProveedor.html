<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../js/gestorProveedor.js" defer></script>
    <link rel="stylesheet" href="../css/FuncionesProveedor.css">
    <title>Document</title>
</head>
<body>

  <div class="container-detalle">
    <form id="formProducto" class="formulario">
        <h2>Gestión de Productos</h2>
        
        <div class="input-group">
            <label for="name">Nombre del Producto</label>
            <input type="text" id="name" placeholder="Ej: Zapatillas Deportivas" required>
        </div>

        <div class="input-group">
            <label for="description">Descripción</label>
            <textarea id="description" placeholder="Describe el producto"></textarea>
        </div>

        <div class="fila-doble">
            <div class="input-group">
                <label for="price">Precio ($)</label>
                <input type="number" id="price" placeholder="0.00" required>
            </div>
            <div class="input-group">
                <label for="stock">Stock</label>
                <input type="number" id="stock" placeholder="0" required>
            </div>
        </div>

        <button type="submit" class="btn-agregar" id="btnGuardar">Guardar Producto</button>
    </form>
</div>

<div id="listaProductos"></div>
</body>
</html>
